version: "3.9"

services:
  identity-postgres:
    image: postgres:16-alpine
    container_name: pulsegrid-identity-postgres
    environment:
      POSTGRES_DB: pulsegrid_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5412:5432"
    volumes:
      - pulsegrid-identity-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pulsegrid-network

  identity-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pulsegrid-identity-service
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "4102"
      INTERNAL_TOKEN: "pulsegrid-internal-token"
      JWT_SECRET: "pulsegrid-jwt-secret"
      TENANT_SERVICE_URL: "http://tenant-service:4101"
      DEFAULT_TENANT_ID: "tenant_northstar_studio"
      DEFAULT_ADMIN_NAME: "Northstar Owner"
      DEFAULT_ADMIN_EMAIL: "owner@northstar.local"
      DEFAULT_ADMIN_PASSWORD: "ChangeMe!123"
      DB_HOST: "identity-postgres"
      DB_PORT: "5432"
      DB_DATABASE: "pulsegrid_identity"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      DB_SYNCHRONIZE: "true"
      NODE_ENV: "production"
    ports:
      - "4102:4102"
    restart: unless-stopped
    depends_on:
      - identity-postgres
    networks:
      - pulsegrid-network

volumes:
  pulsegrid-identity-db:

networks:
  pulsegrid-network:
    external: true
    name: pulsegrid-network

version: "3.9"

services:
  tenant-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pulsegrid-tenant-service
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "4101"
      STORAGE_DIR: "/app/storage"
      INTERNAL_TOKEN: "pulsegrid-internal-token"
      DEFAULT_TENANT_NAME: "Northstar Studio"
      DEFAULT_TENANT_SLUG: "northstar-studio"
      DEFAULT_TENANT_TIMEZONE: "Europe/Kiev"
      NODE_ENV: "production"
    ports:
      - "4101:4101"
    restart: unless-stopped
    networks:
      - pulsegrid-network

networks:
  pulsegrid-network:
    external: true
    name: pulsegrid-network

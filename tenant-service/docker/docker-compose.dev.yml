version: "3.9"

services:
  tenant-postgres:
    image: postgres:16-alpine
    container_name: pulsegrid-tenant-postgres
    environment:
      POSTGRES_DB: pulsegrid_tenants
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5411:5432"
    volumes:
      - pulsegrid-tenant-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pulsegrid-network

  tenant-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pulsegrid-tenant-service
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "4101"
      INTERNAL_TOKEN: "pulsegrid-internal-token"
      DEFAULT_TENANT_NAME: "Northstar Studio"
      DEFAULT_TENANT_SLUG: "northstar-studio"
      DEFAULT_TENANT_TIMEZONE: "Europe/Kiev"
      DB_HOST: "tenant-postgres"
      DB_PORT: "5432"
      DB_DATABASE: "pulsegrid_tenants"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      DB_SYNCHRONIZE: "true"
      NODE_ENV: "production"
    ports:
      - "4101:4101"
    restart: unless-stopped
    depends_on:
      - tenant-postgres
    networks:
      - pulsegrid-network

volumes:
  pulsegrid-tenant-db:

networks:
  pulsegrid-network:
    external: true
    name: pulsegrid-network

version: "3.9"

services:
  pulse-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pulsegrid-pulse-service
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "4103"
      STORAGE_DIR: "/app/storage"
      NODE_ENV: "production"
    ports:
      - "4103:4103"
    restart: unless-stopped
    networks:
      - pulsegrid-network

networks:
  pulsegrid-network:
    external: true
    name: pulsegrid-network

version: "3.9"

services:
  pulse-postgres:
    image: postgres:16-alpine
    container_name: pulsegrid-pulse-postgres
    environment:
      POSTGRES_DB: pulsegrid_pulses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5413:5432"
    volumes:
      - pulsegrid-pulse-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pulsegrid-network

  pulse-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pulsegrid-pulse-service
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "4103"
      DB_HOST: "pulse-postgres"
      DB_PORT: "5432"
      DB_DATABASE: "pulsegrid_pulses"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      DB_SYNCHRONIZE: "true"
      NODE_ENV: "production"
    ports:
      - "4103:4103"
    restart: unless-stopped
    depends_on:
      - pulse-postgres
    networks:
      - pulsegrid-network

volumes:
  pulsegrid-pulse-db:

networks:
  pulsegrid-network:
    external: true
    name: pulsegrid-network
